services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: roleplay
      POSTGRES_PASSWORD: roleplay
      POSTGRES_DB: roleplay
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roleplay"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: REDACTED_SECRET
      FLASK_APP: app:create_app()
      DOMAIN: ${DOMAIN:-localhost}
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "47391:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  pgdata:
